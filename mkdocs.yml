site_name: SuperCarter User Manual
site_description: SuperCarter 操作與使用說明
site_author: SuperCarter Team

theme:
  name: material
  language: zh-TW
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - toc.follow
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - attr_list
  - pymdownx.snippets:
      base_path:
        - docs

hooks:
  - hooks/generate_latest_changelog.py

plugins:
  - print-site:
      add_table_of_contents: true
      toc_title: Table of Contents
      toc_depth: 4
  - search
nav:


  - 首頁: index.md

  - 更新日誌: 
      - CHANGELOG: CHANGELOG/CHANGELOG.md


  # - 首頁: index.md

  # - 快速上手:
  #     - 安裝: getting-started/installation.md
  #     - 介面導覽: getting-started/quick-tour.md
  #     - 基本流程: getting-started/workflow.md
#   - 設備連線:
#       - 支援設備: connection/supported-devices.md
#       - 自動偵測: connection/auto-detect.md
#       - COM管理: connection/com-management.md
#       - 問題排除: connection/troubleshooting.md

#   - 腳本系統:
#       - 概念: scripting/concepts.md
#       - 編輯器: scripting/editor.md
#       - 執行模式: scripting/execution-modes.md
#       - 參數設定: scripting/parameters.md

#   - 監控與資料:
#       - 即時監控: monitoring/live-monitor.md
#       - Logging: monitoring/logging.md
#       - CSV輸出: monitoring/csv-export.md

#   - FAQ:
#       - 常見問題: faq/faq.md
#       - 名詞解釋: faq/glossary.md
